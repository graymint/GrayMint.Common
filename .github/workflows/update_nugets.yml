name: Update NuGets

# Daily dependency updater. Upgrades every PackageReference under src/ and tests/ to the most
# recent version on nuget.org (pub/lib/Update-NugetPackages.ps1, dotnet-outdated based), validates
# the upgrade with a full build + test run, commits, pushes to main, and then dispatches the
# target repo's publish_nugets.yml so the updated packages ship immediately (a push made with
# GITHUB_TOKEN does not retrigger workflows by itself, so the dispatch is explicit).
#
# REUSABLE: other repos call this via `workflow_call` from a thin wrapper that carries its own
# `schedule` trigger (cron only fires in the repo hosting the workflow file). The target repo is
# checked out into repo/; the scripts always come from THIS repo's checkout in tools/. Callers
# must pass `secrets: inherit` and grant `contents: write` + `actions: write`. The caller's thin
# publish wrapper MUST be named publish_nugets.yml — that's what the dispatch step targets.
#
# There is deliberately NO fallback: if the update, the build, the tests, or the push fail, the
# run fails and GitHub notifies by email. Nothing is committed unless the tests pass.

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC (this repo; callers bring their own schedule)
  workflow_dispatch:
  workflow_call:
    inputs:
      runs-on:
        description: "Runner image (callers whose tests need Windows-only pieces such as LocalDB pass windows-latest)"
        type: string
        required: false
        default: ubuntu-latest

permissions:
  contents: write # push the update commit to main
  actions: write  # dispatch the publish workflow

jobs:
  update-nugets:
    runs-on: ${{ inputs.runs-on || 'ubuntu-latest' }}
    env:
      DOTNET_NOLOGO: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      BUILD_CONFIG: Release
    defaults:
      run:
        working-directory: repo
        shell: bash # same step syntax on every runner OS

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          ref: main
          path: repo
          persist-credentials: true # so the push uses github.token

      - name: Checkout build tools (GrayMint.Common)
        uses: actions/checkout@v5
        with:
          repository: graymint/GrayMint.Common
          ref: main
          path: tools

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Update packages to latest
        id: update
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE/tools/pub/lib/Update-NugetPackages.ps1" -repoDir "$env:GITHUB_WORKSPACE/repo"

      - name: Build
        if: steps.update.outputs.updated == 'true'
        run: dotnet build --configuration $BUILD_CONFIG

      - name: Test
        if: steps.update.outputs.updated == 'true'
        run: dotnet test --no-build --configuration $BUILD_CONFIG

      - name: Commit & push
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update NuGet packages to latest"
          git push origin HEAD:main

      - name: Dispatch publish workflow
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run publish_nugets.yml --repo "${{ github.repository }}" --ref main
